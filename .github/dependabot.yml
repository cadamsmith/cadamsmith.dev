version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/New_York'
    # Group patch and minor updates, majors get individual PRs
    groups:
      npm-patch:
        update-types:
          - 'patch'
      npm-minor:
        update-types:
          - 'minor'
    # Limit open PRs to avoid spam
    open-pull-requests-limit: 5
    # Add labels to PRs
    labels:
      - 'dependencies'
    # Commit message prefix
    commit-message:
      prefix: 'chore'
      include: 'scope'
