name: Version Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  version_check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for source file changes
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- \
            'public/' \
            'src/' \
            '.env.cloudflare' \
            'astro.config.mjs' \
            'package.json' \
            'package-lock.json')
          if [ -n "$CHANGED" ]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check version bump
        if: steps.changed.outputs.src_changed == 'true'
        run: |
          BASE_VERSION=$(git show origin/main:package.json | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          PR_VERSION=$(node -e "console.log(require('./package.json').version)")

          echo "Base (main): $BASE_VERSION"
          echo "PR:          $PR_VERSION"

          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "❌ Version has not been bumped. Comment /bump on this PR to auto-calculate the next CalVer."
            exit 1
          fi

          IS_GREATER=$(node -e "
            const parse = v => v.split('.').map(Number);
            const pr = parse('$PR_VERSION');
            const base = parse('$BASE_VERSION');
            for (let i = 0; i < 3; i++) {
              if (pr[i] > base[i]) { console.log('yes'); process.exit(0); }
              if (pr[i] < base[i]) { console.log('no'); process.exit(0); }
            }
            console.log('no');
          ")

          if [ "$IS_GREATER" != "yes" ]; then
            echo "❌ PR version ($PR_VERSION) must be greater than base version ($BASE_VERSION). Comment /bump to recalculate."
            exit 1
          fi

          echo "✅ Version bumped: $BASE_VERSION → $PR_VERSION"
